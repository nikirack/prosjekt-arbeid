<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ny økt - Treningslogg</title>
    <script src="/auth-check.js"></script>
    <script src="ny_økt.js" defer></script>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="ny_økt.css">
</head>
<body>
    <nav>
        <p>TRENINGSLOGG</p>
        <a href="/">[HJEM]</a>
        <a href="#" id="logout-btn">[Logout]</a>
    </nav>
    <main>
        <header>
            <h1>REGISTRER NY ØKT</h1>
            <p>FYLL INN DETALJER</p>
        </header>

        <form id="økt">
            
            <div class="form-group">
                <label for="dato">Dato</label>
                <input type="date" id="dato">
            </div>

            <h2>Øvelser</h2>
            <div id="øvelser"></div>

            <button type="button" id="ny_øvelse" class="btn-stor">
                + Ny øvelse
            </button>

            <button type="submit" id="submit" class="btn-stor">
                Submit økt
            </button>
        </form>

        <footer>
            <p>END // Treningslogg</p>
        </footer>
    </main>
</body>
</html>
